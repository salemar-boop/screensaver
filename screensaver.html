<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Final Presentation Screensaver</title>
    <link rel="stylesheet" href="assets/styles/screensaver.css" />
  </head>
  <body>
    <div class="gradient-bg" aria-hidden="true"></div>
    <div id="koi-layer" aria-hidden="true"></div>
    <canvas id="petal-canvas" aria-label="Falling petals interactive screensaver"></canvas>
    <script>
      const canvas = document.getElementById("petal-canvas");
      const ctx = canvas.getContext("2d");
      const koiLayer = document.getElementById("koi-layer");

      let width = 0;
      let height = 0;
      let petals = [];
      const petalCount = 70;

      const pointer = {
        x: -9999,
        y: -9999,
        active: false
      };

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = Math.floor(width * window.devicePixelRatio);
        canvas.height = Math.floor(height * window.devicePixelRatio);
        canvas.style.width = width + "px";
        canvas.style.height = height + "px";
        ctx.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
      }

      function random(min, max) {
        return Math.random() * (max - min) + min;
      }

      function createPetal(initial = false) {
        return {
          x: random(0, width),
          y: initial ? random(0, height) : random(-height * 0.5, -20),
          vx: random(-0.25, 0.25),
          vy: random(0.6, 1.6),
          size: random(10, 20),
          wobble: random(0, Math.PI * 2),
          wobbleSpeed: random(0.01, 0.03),
          rotation: random(0, Math.PI * 2),
          rotationSpeed: random(-0.02, 0.02),
          hueShift: random(-10, 15)
        };
      }

      function resetPetal(petal) {
        petal.x = random(0, width);
        petal.y = random(-height * 0.35, -20);
        petal.vx = random(-0.25, 0.25);
        petal.vy = random(0.6, 1.6);
        petal.size = random(10, 20);
        petal.wobble = random(0, Math.PI * 2);
        petal.wobbleSpeed = random(0.01, 0.03);
        petal.rotation = random(0, Math.PI * 2);
        petal.rotationSpeed = random(-0.02, 0.02);
        petal.hueShift = random(-10, 15);
      }

      function drawPetal(petal) {
        ctx.save();
        ctx.translate(petal.x, petal.y);
        ctx.rotate(petal.rotation);
        const scale = petal.size / 18;
        ctx.scale(scale, scale);

        const grad = ctx.createLinearGradient(-10, -10, 14, 10);
        grad.addColorStop(0, "hsl(" + (330 + petal.hueShift) + " 88% 86%)");
        grad.addColorStop(1, "hsl(" + (350 + petal.hueShift) + " 95% 72%)");

        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(0, -10);
        ctx.bezierCurveTo(12, -10, 15, 3, 0, 11);
        ctx.bezierCurveTo(-14, 3, -12, -10, 0, -10);
        ctx.fill();

        ctx.fillStyle = "rgba(255, 255, 255, 0.35)";
        ctx.beginPath();
        ctx.ellipse(-2, -3, 2.4, 4.2, -0.3, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }

      function updatePetal(petal) {
        petal.wobble += petal.wobbleSpeed;
        petal.rotation += petal.rotationSpeed;

        petal.x += petal.vx + Math.sin(petal.wobble) * 0.8;
        petal.y += petal.vy;

        petal.vx *= 0.992;
        petal.vy = Math.min(petal.vy + 0.0015, 2.15);

        if (pointer.active) {
          const dx = petal.x - pointer.x;
          const dy = petal.y - pointer.y;
          const distSq = dx * dx + dy * dy;
          const radius = 130;
          if (distSq < radius * radius) {
            const dist = Math.max(Math.sqrt(distSq), 1);
            const force = (radius - dist) / radius;
            const push = force * 1.05;
            petal.vx += (dx / dist) * push;
            petal.vy += (dy / dist) * push * 0.45;
          }
        }

        if (petal.y > height + 30 || petal.x < -60 || petal.x > width + 60) {
          resetPetal(petal);
        }
      }

      function animate() {
        ctx.clearRect(0, 0, width, height);
        for (const petal of petals) {
          updatePetal(petal);
          drawPetal(petal);
        }
        requestAnimationFrame(animate);
      }

      function spawnKoi() {
        const koi = document.createElement("div");
        koi.className = "koi";

        const fromLeft = Math.random() < 0.5;
        const top = Math.round(random(height * 0.1, height * 0.85));
        const duration = random(6, 10).toFixed(2);
        const scale = random(0.8, 1.3).toFixed(2);
        const rotate = random(-8, 8).toFixed(1) + "deg";

        koi.style.top = top + "px";
        koi.style.setProperty("--koi-duration", duration + "s");
        koi.style.setProperty("--koi-scale", scale);
        koi.style.setProperty("--koi-tilt", rotate);

        if (fromLeft) {
          koi.classList.add("from-left");
        } else {
          koi.classList.add("from-right");
        }

        koi.innerHTML = `
          <div class="koi-fish">
            <div class="koi-tail"></div>
            <div class="koi-fin top"></div>
            <div class="koi-fin bottom"></div>
            <div class="koi-eye"></div>
          </div>
        `;

        koiLayer.appendChild(koi);
        window.setTimeout(() => {
          koi.remove();
        }, (Number(duration) + 0.5) * 1000);
      }

      function updatePointer(event) {
        const touch = event.touches ? event.touches[0] : null;
        pointer.x = touch ? touch.clientX : event.clientX;
        pointer.y = touch ? touch.clientY : event.clientY;
        pointer.active = true;
      }

      function clearPointer() {
        pointer.active = false;
        pointer.x = -9999;
        pointer.y = -9999;
      }

      window.addEventListener("resize", resize);
      window.addEventListener("mousemove", updatePointer);
      window.addEventListener("mouseleave", clearPointer);
      window.addEventListener("touchstart", updatePointer, { passive: true });
      window.addEventListener("touchmove", updatePointer, { passive: true });
      window.addEventListener("touchend", clearPointer, { passive: true });

      resize();
      petals = Array.from({ length: petalCount }, () => createPetal(true));
      animate();
      spawnKoi();
      window.setInterval(spawnKoi, 30000);
    </script>
  </body>
</html>
